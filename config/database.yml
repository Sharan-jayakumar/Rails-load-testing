# SQLite version 3.x
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # Pool size should be at least (workers × threads) for optimal performance
  # With 2 workers and 2 threads each, we need at least 4 connections
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 2).to_i * ENV.fetch("WEB_CONCURRENCY", 2).to_i %>

development:
  <<: *default
  database: loadtesting
  username: postgres
  password: password
  host: db
  port: 5432

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: loadtesting_test
  username: postgres
  password: password
  host: db
  port: 5432

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
